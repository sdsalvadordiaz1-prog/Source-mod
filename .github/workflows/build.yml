name: Build Weapons Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - name: Unzip mod source
        run: unzip weaponsmod_source.zip
      - name: Build mod
        run: gradle build --no-daemon -p weaponsmod
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: weaponsmod-jar
          path: weaponsmod/build/libs/weaponsmod-*.jar