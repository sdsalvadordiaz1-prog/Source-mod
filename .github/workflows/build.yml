name: Build Weapons Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip mod source
        run: |
          unzip weaponsmod_source.zip -d mod_extracted
          cp -r mod_extracted/weaponsmod/. ./
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build mod
        run: ./gradlew build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: weaponsmod-jar
          path: build/libs/weaponsmod-*.jar